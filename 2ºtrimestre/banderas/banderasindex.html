<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Banderas CSS</title>

  <link rel="stylesheet" href="./stylebandera.css">
</head>

<body>

<h1>Banderas del mundo en CSS</h1>

<div class="contenedor">

  <!-- HORIZONTALES -->
  <div class="tarjeta"><div class="bandera alemania"></div><p>Alemania</p></div>
  <div class="tarjeta"><div class="bandera espana"></div><p>España</p></div>
  <div class="tarjeta"><div class="bandera rusia"></div><p>Rusia</p></div>
  <div class="tarjeta"><div class="bandera holanda"></div><p>Holanda</p></div>
  <div class="tarjeta"><div class="bandera austria"></div><p>Austria</p></div>
  <div class="tarjeta"><div class="bandera bulgaria"></div><p>Bulgaria</p></div>
  <div class="tarjeta"><div class="bandera hungria"></div><p>Hungría</p></div>

  <!-- VERTICALES -->
  <div class="tarjeta"><div class="bandera francia"></div><p>Francia</p></div>
  <div class="tarjeta"><div class="bandera italia"></div><p>Italia</p></div>
  <div class="tarjeta"><div class="bandera belgica"></div><p>Bélgica</p></div>
  <div class="tarjeta"><div class="bandera irlanda"></div><p>Irlanda</p></div>
  <div class="tarjeta"><div class="bandera rumania"></div><p>Rumanía</p></div>
  <div class="tarjeta"><div class="bandera peru"></div><p>Perú</p></div>

  <!-- MIX -->
  <div class="tarjeta"><div class="bandera grecia"></div><p>Grecia</p></div>
  <div class="tarjeta"><div class="bandera suiza"></div><p>Suiza</p></div>

  <!-- CIRCULOS -->
  <div class="tarjeta"><div class="bandera japon"></div><p>Japón</p></div>
  <div class="tarjeta"><div class="bandera bangladesh"></div><p>Bangladesh</p></div>
  <div class="tarjeta"><div class="bandera palau"></div><p>Palau</p></div>

  <!-- TRIANGULOS -->
  <div class="tarjeta"><div class="bandera checa"></div><p>República Checa</p></div>
  <div class="tarjeta"><div class="bandera bahamas"></div><p>Bahamas</p></div>

  <!-- LUNAS -->
  <div class="tarjeta"><div class="bandera turquia"></div><p>Turquía</p></div>
  <div class="tarjeta"><div class="bandera pakistan"></div><p>Pakistán</p></div>

  <!-- ESTRELLAS -->
  <div class="tarjeta">
    <div class="bandera vietnam">
      <div class="estrella"></div>
    </div>
    <p>Vietnam</p>
  </div>

  <div class="tarjeta">
    <div class="bandera china">
      <div class="estrella"></div>
    </div>
    <p>China</p>
  </div>

  <!-- DIFÍCILES -->
  <div class="tarjeta"><div class="bandera brasil"></div><p>Brasil</p></div>
  <div class="tarjeta"><div class="bandera usa"></div><p>Estados Unidos</p></div>
  <div class="tarjeta"><div class="bandera suecia"></div><p>Suecia</p></div>

</div>

</body>
</html>
