<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta name="author" content="Rafael García Sánchez">
    <style>
        .gridcont{
            padding: 3px;
            background-color: #0da32dcc;
            justify-content: center;
            display: grid;
            grid-template-columns: 8% 8% 8% 8% 8% 8% 8% 8% 8% 8% 8% 8%;
            gap: 0.2vw;
        }
        .griditem{
            background-color: #06fa3bcc;
        border: 1px solid rgba(0, 0, 0, 0.8);
        
        padding: 20px;
        font-size: 3em;
        text-align: center;
        }
        .itemmot{
            background-color: antiquewhite;
        }
        .itemmit{
            grid-column: span 6;
        }
        .itemter{
            grid-column: span 4;
        }

        .itemcua{
            grid-column: span 3;
        }
       
        .itemsix{
            grid-column: span 2 ;
        }
        .itemsixes{
            grid-column: 3 /span 2 ;
            
        }
        .itemsixos{
            grid-column: 6 /span 2 ;
        }
        .itemsixis{
            grid-column: 9 /span 2 ;
        }
        .itemra{
            grid-column: 2 /span 2 ;
        }
        .itemrar{
            grid-column: 5 /span 4 ;
        }
        .itemraro{
            grid-column: 10 /span 2 ;
        }
        .item1{
            grid-column: 1;
        }

    </style>
</head>
<body>
    <div class="gridcont">
        <div class="griditem itemmot">1</div>
        <div class="griditem itemmot">2</div>
        <div class="griditem itemmot">3</div>
        <div class="griditem itemmot">4</div>
        <div class="griditem itemmot">5</div>
        <div class="griditem itemmot">6</div>
        <div class="griditem itemmot">7</div>
        <div class="griditem itemmot">8</div>
        <div class="griditem itemmot">9</div>
        <div class="griditem itemmot">10</div>
        <div class="griditem itemmot">11</div>
        <div class="griditem itemmot">12</div>
        <div class="griditem itemmit"></div>
        <div class="griditem itemmit"></div>
        <div class="griditem itemter"></div>
        <div class="griditem itemter"></div>
        <div class="griditem itemter"></div>
        <div class="griditem itemcua"></div>
        <div class="griditem itemcua"></div>
        <div class="griditem itemcua"></div>
        <div class="griditem itemcua"></div>
        <div class="griditem itemsix"></div>
        <div class="griditem itemsix"></div>
        <div class="griditem itemsix"></div>
        <div class="griditem itemsix"></div>
        <div class="griditem itemsix"></div>
        <div class="griditem itemsix"></div>
        <div class="griditem itemsixes"></div>
        <div class="griditem itemsixos"></div>
        <div class="griditem itemsixis"></div>
        <div class="griditem itemra"></div>
        <div class="griditem itemrar"></div>
        <div class="griditem itemraro"></div>
        <div class="griditem item1"></div>
        <div class="griditem"></div>
        <div class="griditem"></div>
        <div class="griditem"></div>
        <div class="griditem"></div>
        <div class="griditem"></div>
        <div class="griditem"></div>
        <div class="griditem"></div>
        <div class="griditem"></div>
        <div class="griditem"></div>
        <div class="griditem"></div>
        <div class="griditem"></div>
    </div>
</body>
</html>
