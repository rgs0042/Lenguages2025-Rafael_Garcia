<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Rafael García Sánchez">
    <title>posicionamiento 01</title>
    <style>
        * {
            margin: 0;
            height: 100%;
        }
        .azul{
            background-color: blue;
            width: 100%;
            height: 25%;
            float: left;
        }

        .azul>h1{
            font-size: 7em;
        }
        .rojo{
            background-color:red;
            width: 25%;
            height: 75%;
            float: left;
        }
        .verde{
            background-color: green;
            width: 75%;
            height: 37.5%;
            float: right;
        }
        .amarillo{
            background-color: yellow;
            width: 75%;
            height: 37.5%;
            float: right;
        }

        
    </style>
</head>

<body>
    <main>
        <div class="azul"> 
            <h1>Título largo en azul</h1>
        </div>
        <div class="rojo">
            <p>rojo</p>
        </div>
        <div class="verde">
            <p>verde</p>
        </div>
        <div class="amarillo">
            <p>amarillo</p>
        </div>
    </main>
</body>

</html>
