<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejemplo Flexbox</title>
  <style>
    body {
      margin: 0;
      background-color: #7589b4;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 0;
      box-sizing: border-box;
    }

    /* Header centrado moderno */
    header {
      width: 100%;
      max-width: 1200px;
      text-align: center;
      background-color: #4a5f9e;
      color: white;
      padding: 20px 0;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      font-size: 1.5em;
      font-weight: bold;
    }

    .contenedor {
      align-items:center;
      justify-content:center;
      border: 2px solid darkblue;
      width: 1200px;
      height: 700px;
      display: flex;
      flex-direction:row;
      gap: 15px;
      padding: 20px;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .caja {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: steelblue;
      color: white;
      font-size: 3em;
      font-weight: bold;
      border-radius: 8px;
      flex-grow:1 ;
    }

   .caja1{

      width: 150px;
      height: 100%;
      background-color:red;
    }
    .caja2 {
      width: 150px;
      height: 100%;
      background-color:brown;
    }

    .caja3 {
      width: 250px;
      height: 100%;
      background-color:darkmagenta;
    }

    .caja4 {
      width: 150px;
      height: 100%;
      background-color:deeppink;
    }
  </style>
</head>
<body>

  <header><h1>Rafael García Sánchez</h1></header>

  <div class="contenedor">
    <div class="caja caja1">1</div>
    <div class="caja caja2">2</div>
    <div class="caja caja3">3</div>
    <div class="caja caja4">4</div>
  </div>

</body>
</html>
