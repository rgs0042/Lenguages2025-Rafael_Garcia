<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expicación estilos css</title>
  <meta name="author" content="Rafael García Sánchez">
  <style>
    body{
      background-color:aliceblue;
    }

    h1 {
      text-align: center;
    }

    div {
      width: 200px;
      padding: 20px;
      border: 1px solid #007acc;
      margin: 20px;
      background-color: #e0f3ff;
    }
  </style>
</head>

<body>
  <!-- El ejemplo muestra una caja con texto en su interior, la caja es la que controla los espacios, tenemos el contenido(heigth, width), el padding es el espacio que tenemos del contenido hasta el borde. El borde es el que diferencia el padding(relleno) con el margen (margin). El margin es el que nos da la distancia de un contenedor a otro -->
  <h1>Modelo de Caja (Box Model)</h1>
  <p>El modelo de caja define cómo se calculan el ancho, alto y el espacio que ocupa un elemento: contenido, padding,
    borde y margen.</p>
  <hr style="margin: 0;">
  <div class="box">Soy una caja con contenido, padding, borde y margen.</div>

</body>
